require conf/distro/amd-edf.conf

DISTRO = "vd100"
DISTRO_NAME = "VD100 Linux"
VD100_DISTRO_VERSION = "1.0"
VD100_DISTRO_VERSION_MINOR = "0"
DISTRO_CODENAME = "versal"
VD100_DISTRO_VER_TYPE="development"

#MACHINEOVERRIDES =. "versal:"

# This will be set in local.conf for CI builds
VD100_DISTRO_VER_BUILD ?= "${@'${METADATA_REVISION}' if d.getVar('METADATA_REVISION') != '<unknown>' else 'unknown'}"

# Follow the Poky format of <Version>+<type>-<date>
DISTRO_VERSION = "${VD100_DISTRO_VERSION}${VD100_DISTRO_VERSION_MINOR}+${VD100_DISTRO_VER_TYPE}-${VD100_DISTRO_VER_BUILD}"

SDK_VERSION := "-${DISTRO_VERSION}"
MAINTAINER = "Adilson Dias <https://github.com/adilsondias-engineer/versal-ai-edge-vd100-linux>"
SDK_NAME_PREFIX = "vd100"
SDK_NAME = "${SDK_NAME_PREFIX}-${SDKMACHINE}-${IMAGE_BASENAME}-${TUNE_PKGARCH}-${MACHINE}"
SDKPATH = "/opt/${SDK_NAME_PREFIX}/${SDK_VERSION}"
SDKEXTPATH = "~/${SDK_NAME_PREFIX}_sdk/${DISTRO_VERSION}"
SDK_INCLUDE_NATIVESDK = "1"

DISTRO_VERSION[vardepsexclude] = "DATE"
SDK_VERSION[vardepsexclude] = "DATE"

# Define the default hostname
hostname:pn-base-files:vd100 = "vd100"
hostname:pn-base-files = "vd100"

TARGET_VENDOR = "-vd100"

DISTRO_FEATURES:append = " ${AMD-EDF_DISTRO_FEATURES}"

IMAGE_CLASSES += "extrausers"
EXTRA_USERS_PARAMS = "\
    useradd -p '' vd100-usr;passwd-expire vd100-usr; \
    groupadd -r aie; \
    groupadd -r wayland; \
    usermod -a -G aie,audio,input,video,wayland vd100-usr; \
    useradd -m -G sudo adilson; \
    usermod -p '\$6\$t3D07fSzxGsY23wR\$z5GjOzX7cPGErVT1HV1Y8HP0K/88t/hENEJhQSOKesj4vUBOxb.fzbE7.cZTZssQpx613lYKlW6WWkb9sMLSC0' adilson; \
    usermod -a -G aie,audio,input,video,wayland adilson; \
    "
USERADDEXTENSION:append = " amd-useradd-sudoers"
EXTRA_USERS_SUDOERS = "vd100-usr ALL=(ALL) ALL; adilson ALL=(ALL) ALL;"
