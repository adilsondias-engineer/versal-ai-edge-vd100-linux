# We have a conf and classes directory, add to BBPATH
CONF_VERSION = "5"
BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-vd100"
BBFILE_PATTERN_meta-vd100 := "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-vd100 := "20"
LAYERSERIES_COMPAT_meta-vd100 = "scarthgap"
